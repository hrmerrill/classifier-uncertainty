name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: make check
      - run: make test
      - name: Generate badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p .github/badges
          uv run genbadge coverage -i coverage.xml -o .github/badges/coverage.svg
          uv run interrogate --generate-badge .github/badges/ src/
      - name: Commit badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg .github/badges/interrogate_badge.svg
          git diff --staged --quiet || git commit -m "chore: update badges"
          git push
